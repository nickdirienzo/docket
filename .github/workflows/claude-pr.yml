name: Claude PR Review
on:
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]

jobs:
  # When a review requests changes, post a @claude comment to trigger the respond job
  trigger:
    if: github.event_name == 'pull_request_review' && github.event.review.state == 'changes_requested'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post @claude comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body "@claude Please address the review feedback: ${{ github.event.review.html_url }}"

  # When @claude is mentioned in a PR comment, respond and re-request review
  respond:
    if: github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') && github.event.issue.pull_request
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install and build MCP server
        run: npm ci && npm run build --workspace=mcp-server
      - name: Create MCP config
        env:
          DOCKET_WORKER_URL: ${{ secrets.DOCKET_WORKER_URL }}
          DOCKET_API_TOKEN: ${{ secrets.DOCKET_API_TOKEN }}
        run: |
          cat > .mcp.json <<EOF
          {
            "mcpServers": {
              "docket": {
                "command": "node",
                "args": ["${GITHUB_WORKSPACE}/mcp-server/dist/index.js"],
                "env": {
                  "DOCKET_WORKER_URL": "${DOCKET_WORKER_URL}",
                  "DOCKET_API_TOKEN": "${DOCKET_API_TOKEN}"
                }
              }
            }
          }
          EOF
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--allowedTools "Bash,Edit,Write,Read,mcp__docket__query,mcp__docket__create_task,mcp__docket__update_task,mcp__docket__get_task,mcp__docket__list_tasks,mcp__docket__get_context,mcp__docket__create_project,mcp__docket__update_project,mcp__docket__get_project,mcp__docket__list_projects"'
      - name: Re-request review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.issue.number }}
          REVIEWERS=$(gh pr view "$PR_NUMBER" --repo ${{ github.repository }} --json reviewRequests --jq '.reviewRequests[].login' 2>/dev/null || true)
          if [ -z "$REVIEWERS" ]; then
            gh pr edit "$PR_NUMBER" --repo ${{ github.repository }} --add-reviewer ${{ github.repository_owner }}
          fi
