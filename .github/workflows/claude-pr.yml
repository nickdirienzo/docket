name: Claude PR Review
on:
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to revise
        required: true
      pr_branch:
        description: PR head branch
        required: true
      review_url:
        description: URL of the review requesting changes
        required: true

jobs:
  revise:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.review.state == 'changes_requested'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.pr_branch || github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install and build MCP server
        run: npm ci && npm run build --workspace=mcp-server
      - name: Create MCP config
        env:
          DOCKET_WORKER_URL: ${{ secrets.DOCKET_WORKER_URL }}
          DOCKET_API_TOKEN: ${{ secrets.DOCKET_API_TOKEN }}
        run: |
          cat > .mcp.json <<EOF
          {
            "mcpServers": {
              "docket": {
                "command": "node",
                "args": ["${GITHUB_WORKSPACE}/mcp-server/dist/index.js"],
                "env": {
                  "DOCKET_WORKER_URL": "${DOCKET_WORKER_URL}",
                  "DOCKET_API_TOKEN": "${DOCKET_API_TOKEN}"
                }
              }
            }
          }
          EOF
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          trigger_phrase: ""
          claude_args: '--allowedTools "Bash,Edit,Write,Read,mcp__docket__query,mcp__docket__create_task,mcp__docket__update_task,mcp__docket__get_task,mcp__docket__list_tasks,mcp__docket__get_context,mcp__docket__create_project,mcp__docket__update_project,mcp__docket__get_project,mcp__docket__list_projects"'
          prompt: |
            A reviewer has requested changes on this PR.
            Review feedback: ${{ inputs.review_url || github.event.review.html_url }}
            Please address all the feedback, push your changes, and leave a comment summarizing what you changed.
      - name: Re-request review
        if: github.event_name == 'pull_request_review'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr edit ${{ github.event.pull_request.number }} --add-reviewer ${{ github.event.review.user.login }}

  merge:
    if: github.event.review.state == 'approved'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --squash --delete-branch
