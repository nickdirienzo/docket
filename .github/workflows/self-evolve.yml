name: Self-Evolve
on:
  schedule:
    - cron: '0 8 * * 1' # Weekly Monday 8am UTC
  workflow_dispatch:

jobs:
  evolve:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install and build MCP server
        run: npm ci && npm run build --workspace=mcp-server
      - name: Create MCP config
        env:
          DOCKET_WORKER_URL: ${{ secrets.DOCKET_WORKER_URL }}
          DOCKET_API_TOKEN: ${{ secrets.DOCKET_API_TOKEN }}
        run: |
          cat > .mcp.json <<EOF
          {
            "mcpServers": {
              "docket": {
                "command": "node",
                "args": ["${GITHUB_WORKSPACE}/mcp-server/dist/index.js"],
                "env": {
                  "DOCKET_WORKER_URL": "${DOCKET_WORKER_URL}",
                  "DOCKET_API_TOKEN": "${DOCKET_API_TOKEN}"
                }
              }
            }
          }
          EOF
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          claude_args: '--allowedTools "Bash,Edit,Write,Read,mcp__docket__query,mcp__docket__create_task,mcp__docket__update_task,mcp__docket__get_task,mcp__docket__list_tasks,mcp__docket__get_context,mcp__docket__create_project,mcp__docket__update_project,mcp__docket__get_project,mcp__docket__list_projects"'
          prompt: |
            You have access to Docket via MCP.

            1. Check Docket for open tasks (not_started) — these are work items
               that humans have identified. Pick up any that you can address
               with code changes to this repo.
            2. Query the activity_log for the past week
            3. Read past observations so you don't repeat yourself
            4. Look for patterns: repeated multi-step sequences,
               missing fields, common queries, friction points
            5. Decide what to improve (conventions, tools, schema, code)
            6. Make the changes and open a PR, add nickdirienzo as a reviewer
            7. Update any Docket tasks you addressed (set status, link PR)
            8. Store an observation in Docket summarizing what you did and why
