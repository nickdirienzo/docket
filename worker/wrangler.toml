name = "docket"
main = "src/index.ts"
compatibility_date = "2025-03-01"

[durable_objects]
bindings = [
  { name = "TASK_STORE", class_name = "TaskStore" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TaskStore"]

[vars]
ENVIRONMENT = "production"

[triggers]
crons = ["0 */6 * * *"]  # Every 6 hours

# Secrets (set via `wrangler secret put`):
# - API_TOKEN
# - ANTHROPIC_API_KEY (required for observer)
